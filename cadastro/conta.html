<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/conta.css">
    <title>Crie sua conta - Notícias PB</title>
</head>
<body>
    <header>
        <h1>Notícias PB</h1>
        <p>Crie sua conta para receber notificações exclusivas.</p>
    </header>

    <nav>
        <a href="/HTML.html">Voltar para Início</a>
    </nav>

    <main>
        <article>
            <h2>Cadastro de Usuário</h2>
            <p>Preencha os campos abaixo para se cadastrar.</p>
            <br>

            <form action="HTML.html" method="POST">
                <div class="form-group">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required 
                           placeholder="Ex: José Victor">
                </div>

                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone (celular):</label>
                    <input type="tel" id="telefone" name="telefone" 
                           pattern="\([0-9]{2}\) [0-9]{5}-[0-9]{4}" 
                           placeholder="(83) 98888-7777" required>
                    <span class="error-msg">Formato esperado: (83) 98888-7777</span>
                </div>

                <div class="form-group">
                    <label for="senha">Senha (mínimo 6 caracteres):</label>
                    <input type="password" id="senha" name="senha" 
                           minlength="6" required>
                </div>

                <button type="submit">Finalizar Cadastro</button>
            </form>
        </article>
    </main>

    <footer>
        <p>© 2026 - Notícias PB </p>
        <p>Criado por José Victor da Silva Nascimento</p>
    </footer>

    <script>
        const formulario = document.querySelector('form');
        
        formulario.onsubmit = function(evento) {
            // Impede o envio imediato para mostrar o alerta
            evento.preventDefault(); 
            
            alert("Cadastro realizado com sucesso! Redirecionando...");
            
            // Redireciona para a sua página principal após o OK do usuário
            window.location.href = "/HTML.html";
        };
    </script>
</body>
</html>
